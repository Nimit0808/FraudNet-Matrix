version: '3.8'

services:
  neo4j:
    image: neo4j:5.12.0
    container_name: fund_dna_neo4j
    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt Protocol (Python Driver)
    environment:
      - NEO4J_AUTH=neo4j/fund_dna_secure_pwd
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

volumes:
  neo4j_data:
